<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="public/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=MedievalSharp&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/images/Icon.png" type="image/svg+xml">

    <title>City of Whispers</title>
</head>
<body>
    
<header class="header-main">
    <div class="container"> 
        <div class="d-flex flex-wrap justify-content-between align-items-center py-3"> 
            <div class="d-flex align-items-center link-body-emphasis text-decoration-none">
                <img src="./assets/images/Icon.png" alt="Icon" width="40" height="40" style="margin-right: 10px; vertical-align: middle;">
                <p class="desctiptrion"  data-i18n="header.title" style="margin: 0;"></p>
            </div> 
            
            <!-- language switcher -->
            <div>
                <ul class="nav nav-pills"> 
                <li class="nav-item">
                    <button id="en" class="nav-link">EN</button>
                </li>
                <li class="nav-item">
                    <button id="bg" class="nav-link">BG</button>
                </li> 
                <li class="nav-item">
                    <button id="ru" class="nav-link">RU</button>
                </li>
            </ul>
            </div>
        </div>
    </div>
</header>


<div class="intro-wrapper">
    <img class="intro-image" src="assets/images/forSite.png" alt="">

    <div class="text-card">
        <h1 style="font-family: 'EB Garamond', serif" data-i18n="intro.title"></h1>
        <p class="desctiptrion" data-i18n="intro.description">
           
        </p>
    </div>
</div>
<section class="content">
  <div class="container" id="main-container">
  <button class="play-button" id="play-btn">▶ Play</button>

<iframe 
    id="game-frame" 
    src="game.html"
    allow="fullscreen"
  ></iframe>
</div>

<div class="descriptions-section">
  <div class="description-paragraph">
    <img src="assets/images/choice-svgrepo-com.svg" alt="choices" class="description-svg">
    <span data-i18n="description.paragraph1"></span>
  </div>
  <div class="description-paragraph">
    <img src="assets/images/language-svgrepo-com.svg" alt="languages" class="description-svg">
    <span data-i18n="description.paragraph2"></span>
  </div>
  <div class="description-paragraph">
    <img src="assets/images/branch-svgrepo-com.svg" alt="branches" class="description-svg">
    <span data-i18n="description.paragraph3"></span>
  </div>
</div>

    <h2 data-i18n="characters.title"></h2>

<div id="carouselExample" class="carousel slide">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <div class="character-card">

  <div class="card-text top" data-i18n="characters.saylas.card.top">
  </div>

  <div class="card-text left" data-i18n="characters.saylas.card.left">
  </div>

  <div class="card-character">
    <img src="assets/images/Saylas.png" alt="Character">
  </div>

</div>
    </div>
    <div class="carousel-item">
      <div class="character-card">

  <div class="card-text top" data-i18n="characters.alaras.card.top">
  </div>

  <div class="card-text left" data-i18n="characters.alaras.card.left">
  </div>

  <div class="card-character">
    <img src="assets/images/Alaras.png" alt="Character">
  </div>

</div>
    </div>
    
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>
<hr>
<div class="my-1"> <div class="p-5 text-center warning"> <div class="container py-5"> <h1 class="desctiptrion" style="font-size: 30px; color:aliceblue" data-i18n="content.warning.title"> </h1> <p class="col-lg-8 mx-auto lead" data-i18n="content.warning.text">

</p> </div> </div> </div>
<hr>
  
</section>

<div class="footer-content"> 
     <footer>
        <p class="desctiptrion" data-i18n="footer.contactMe"></p>
         <ul class="nav justify-content-center border-top py-4 mb-3">
            <li class="nav-item"><a href="mailto:anastasiaolenina6@gmail.com" class="nav-link px-2 text-body-secondary" data-i18n="footer.gmail"></a></li> 
            <li class="nav-item"><a href="https://www.linkedin.com/in/anastasia-olenina-627673380/" class="nav-link px-2 text-body-secondary" data-i18n="footer.linkedin"></a></li>
            <li class="nav-item"><a href="https://github.com/Nastyuole" class="nav-link px-2 text-body-secondary" data-i18n="footer.github"></a></li>
        </ul>
        <p id="iconsFrom" class="desctiptrion">Some icons from <a href="https://www.svgrepo.com" class="text-light-emphasis">SVGRepo</a></p>
     </footer> 
</div>


<script type="module" src="./js/index.js"></script>

<script type="module" src="./js/localization.js"></script>

</body>
</html>
