<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="public/gameStyles.css">
    <title>Document</title>
</head>
<body>

<div id="game">
  <div id="dialog-box">
    <div id="dialog-text"></div>
    <div id="choices"></div>
  </div>
</div>

<script>
let scenes = {};
let currentLanguage = localStorage.getItem('lang') || 'en';

// IMPORTANT: TEMPORARY FUNCTION TO EXIT FULLSCREEN REMOVE IT LATER
function exitFullscreen() {
  try { if (window.parent && window.parent.document && window.parent.document.fullscreenElement) window.parent.document.exitFullscreen?.().catch?.(()=>{}); } catch(e) {}
}
// END OF TEMPORARY FUNCTION

// Load game scenes from translation
async function loadGameScenes(lang) {
  try {
    const langMap = { 'en': 'en', 'ru': 'ru', 'bg': 'bg' };
    const langCode = langMap[lang] || 'en';
    const response = await fetch(`../assets/locales/${langCode}/${langCode}GameTranslation.json`);
    const data = await response.json();
    scenes = data.scenes;
    showScene("start");
  } catch (error) {
    console.error('Error loading game scenes:', error);
  }
}

const dialogText = document.getElementById("dialog-text");
const choicesBox = document.getElementById("choices");

function showScene(name) {
  const scene = scenes[name];
  if (!scene) return;
  
  dialogText.textContent = scene.text;
  choicesBox.innerHTML = "";

  scene.choices.forEach(choice => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.textContent = choice.label;
    btn.onclick = () => {
        
    //IMPORTANT: ITS JUST A TEMPORARY STATE REMOVE IT LATER
        if (choice.next === "gameExit" || choice.next === null) {
         exitFullscreen();
         return;
        }
     //END OF TEMPORARY STATE

  if (choice.next) {
    showScene(choice.next);
  }
};

    choicesBox.appendChild(btn);
  });
}

// Listen for language changes from parent window
window.addEventListener('languageChanged', (event) => {
  currentLanguage = event.detail?.lang || localStorage.getItem('lang') || 'en';
  loadGameScenes(currentLanguage);
});

// Initial load
loadGameScenes(currentLanguage);

// Listen for restart command from parent (postMessage)
window.addEventListener('message', (event) => {
  try {
    if (event.data && event.data.type === 'restartGame') {
      // reload scenes and show start
      loadGameScenes(currentLanguage);
    }
  } catch (e) { }
});
</script>

<script type="module" src="./localization.js"></script>
</body>
</html>
