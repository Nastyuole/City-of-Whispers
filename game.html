<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="public/gameStyles.css">
    <title>City of Whispers</title>
</head>
<body>

<div id="title-screen" class="title-screen">
  <img class="title-background" src="./assets/images/MainPic.png" alt="City of Whispers">
  <div class="menu-overlay">
    <h1 class="game-title">City of Whispers</h1>
    <div class="menu-container" id="menu-container">
        <button id="new-game-btn" class="menu-button" data-i18n="continueGame"></button>
        <button id="load-start-btn" class="menu-button" data-i18n="newGame"></button>
        <button id="load-game-btn" class="menu-button" data-i18n="loadGame"></button>
        <button id="settings-btn" class="menu-button" data-i18n="settings"></button>
        <button id="exit-btn" class="menu-button" data-i18n="exit"></button>
    </div>
    <div class="settings-container" id="settings-container">
        <h2 class="text-light mb-30" data-i18n="settingsTitle"></h2>
        <div class="settings-group">
            <label class="label-text" data-i18n="languageLabel"></label>
            <div class="flex-gap">
                <button class="lang-btn" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="ru">RU</button>
                <button class="lang-btn" data-lang="bg">BG</button>
            </div>
        </div>
        <div class="settings-group mt-30">
            <label for="font-size-slider" class="label-text" data-i18n="fontSizeLabel"></label>
            <input type="range" id="font-size-slider" min="14" max="28" value="18" class="slider" title="Adjust font size">
            <span id="font-size-value" class="text-light mt-8">18px</span>
        </div>
        <button id="back-btn" class="menu-button mt-30" data-i18n="back"></button>
    </div>
    <div class="load-game-container" id="load-game-container">
        <h2 class="text-light mb-30" i18n="loadGame"></h2>
        <div id="load-game-slots" class="load-game-slots">
          <div class="load-slot-row">
            <button class="load-game-slot-btn" data-slot="1">
              <span class="slot-title">Save Slot 1</span>
              <span class="slot-info">Empty</span>
            </button>
            <button type="button" class="delete-slot-btn" data-slot="1" title="Delete save">
              <img src="./assets/images/delete-svgrepo-com.svg" alt="Delete"/>
            </button>
          </div>
          <div class="load-slot-row">
            <button class="load-game-slot-btn" data-slot="2">
              <span class="slot-title">Save Slot 2</span>
              <span class="slot-info">Empty</span>
            </button>
            <button type="button" class="delete-slot-btn" data-slot="2" title="Delete save">
              <img src="./assets/images/delete-svgrepo-com.svg" alt="Delete"/>
            </button>
          </div>
          <div class="load-slot-row">
            <button class="load-game-slot-btn" data-slot="3">
              <span class="slot-title">Save Slot 3</span>
              <span class="slot-info">Empty</span>
            </button>
            <button type="button" class="delete-slot-btn" data-slot="3" title="Delete save">
              <img src="./assets/images/delete-svgrepo-com.svg" alt="Delete"/>
            </button>
          </div>
        </div>
        <button id="load-back-btn" class="menu-button mt-30" data-i18n="back"></button>
    </div>
  </div>
</div>

<div id="video-screen" class="video-screen hidden">
  <video id="intro-video" width="100%" height="100%" muted>
    <source src="./assets/images/MainMenu.mp4" type="video/mp4">
  </video>
</div>


<div id="game">
  <!-- Game Menu Button (Top Left) -->
  <button id="game-menu-btn" class="game-menu-btn" title="Menu">
    <img src="./assets/images/icons8-menu-50.png" class="menu-icon" alt="Menu"/>
  </button>

  <!-- Main Game Content -->
  <div id="dialog-box">
    <div id="dialog-text"></div>
    <div id="choices"></div>
  </div>

  <!-- Game Menu Panel (Overlay on game) -->
  <div id="game-menu-panel" class="game-menu-panel hidden">
    <div class="game-menu-content">
      <h2>Menu</h2>
      
      <!-- Save Game Section -->
      <div class="game-menu-section">
        <button class="game-menu-option" id="save-game-btn">
          <img src="./assets/images/icons8-save-50.png" style="width: 20px; height: 20px;" alt="Save Game"/>
          <span data-i18n="saveGame"></span>
        </button>
        <!-- Save Containers -->
        <div id="save-containers" class="save-containers hidden">
          <div id="save-slot-1" class="save-slot">
            <div class="save-slot-row">
              <button class="save-slot-btn" data-slot="1" data-i18n="saveGame">
                <span class="save-slot-title"></span>
                <span class="save-slot-info"></span>
              </button>
              <button type="button" class="delete-slot-btn-in-game" data-slot="1" title="Delete save">
                <img src="./assets/images/delete-svgrepo-com.svg" alt="Delete"/>
              </button>
            </div>
          </div>
          <div id="save-slot-2" class="save-slot">
            <div class="save-slot-row">
              <button class="save-slot-btn" data-slot="2">
                <span class="save-slot-title"></span>
                <span class="save-slot-info"></span>
              </button>
              <button type="button" class="delete-slot-btn-in-game" data-slot="2" title="Delete save">
                <img src="./assets/images/delete-svgrepo-com.svg" alt="Delete"/>
              </button>
            </div>
          </div>
          <div id="save-slot-3" class="save-slot">
            <div class="save-slot-row">
              <button class="save-slot-btn" data-slot="3">
                <span class="save-slot-title"></span>
                <span class="save-slot-info"></span>
              </button>
              <button type="button" class="delete-slot-btn-in-game" data-slot="3" title="Delete save">
                <img src="./assets/images/delete-svgrepo-com.svg" alt="Delete"/>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Load Game Section -->
      <div class="game-menu-section">
        <button class="game-menu-option" id="load-game-btn-in-game">
          <img src="./assets/images/icons8-save-50.png" style="width: 20px; height: 20px;" alt="Load Game"/>
          <span data-i18n="loadGame"></span>
        </button>
        <!-- Load Containers -->
        <div id="load-containers" class="save-containers hidden">
          <div id="load-slot-1" class="save-slot">
            <div class="load-slot-row">
              <button class="load-slot-btn" data-slot="1">
                <span class="save-slot-title"></span>
                <span class="save-slot-info"></span>
              </button>
              <button class="delete-slot-btn-in-game" data-slot="1" title="Delete save">
                <img src="./assets/images/delete-svgrepo-com.svg" alt="Delete"/>
              </button>
            </div>
          </div>
          <div id="load-slot-2" class="save-slot">
            <div class="load-slot-row">
              <button class="load-slot-btn" data-slot="2">
                <span class="save-slot-title"></span>
                <span class="save-slot-info"></span>
              </button>
              <button class="delete-slot-btn-in-game" data-slot="2" title="Delete save">
                <img src="./assets/images/delete-svgrepo-com.svg" alt="Delete"/>
              </button>
            </div>
          </div>
          <div id="load-slot-3" class="save-slot">
            <div class="load-slot-row">
              <button class="load-slot-btn" data-slot="3">
                <span class="save-slot-title"></span>
                <span class="save-slot-info"></span>
              </button>
              <button class="delete-slot-btn-in-game" data-slot="3" title="Delete save">
                <img src="./assets/images/delete-svgrepo-com.svg" alt="Delete"/>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Settings Section -->
      <div class="game-menu-section">
        <button class="game-menu-option" id="settings-game-btn">
          <img src="./assets/images/icons8-settings-50.png" style="width: 20px; height: 20px;" alt="Settings"/>
          <span data-i18n="settings"></span>
        </button>
      </div>

      <!-- Settings Panel (Hidden by default) - moved here so it appears under Settings and above Exit -->
      <div id="game-settings-panel" class="game-settings-panel hidden">
        <div class="settings-group-game">
          <label data-i18n="languageLabel"></label>
          <div class="lang-buttons-game">
            <button class="lang-btn-game" data-lang="en">EN</button>
            <button class="lang-btn-game" data-lang="ru">RU</button>
            <button class="lang-btn-game" data-lang="bg">BG</button>
          </div>
        </div>
        <div class="settings-group-game">
          <label for="font-size-slider-game" data-i18n="fontSizeLabel"></label>
          <input type="range" id="font-size-slider-game" min="14" max="28" value="18">
          <span id="font-size-value-game">18px</span>
        </div>
        <button id="close-settings-game-btn" class="menu-button-small" data-i18n="back"></button>
      </div>

      <!-- Exit Section (placed with other menu options) -->
      <div class="game-menu-section">
        <button class="game-menu-option" id="exit-to-menu-btn" title="Exit to Menu">
          <img src="./assets/images/icons8-exit-30.png" alt="Exit" class="menu-icon">
          <span data-i18n="exitToMenu"></span>
        </button>
      </div>

      <!-- Close Menu Button -->
      <button id="close-menu-btn" class="menu-button-small" data-i18n="closeMenu"></button>
    </div>
  </div>
</div>
<!-- In-page confirm modal to avoid native confirm() stealing focus -->
<div id="confirm-backdrop" class="confirm-modal-backdrop" aria-hidden="true">
  <div class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
  <div id="confirm-title" data-i18n="comfirm"></div>
  <div id="confirm-message"></div>
    <div class="confirm-buttons">
      <button id="confirm-no" class="confirm-no" type="button" data-i18n="comfirm-No"></button>
      <button id="confirm-yes" class="confirm-yes" type="button" data-i18n="comfirm-Yes"></button>
    </div>
  </div>
</div>

<script type="module" src="./js/game.js"></script>

<script type="module" src="./js/localization.js"></script>

<script type="module">
  import { setupTitleScreenMenu } from './js/menuHandler.js';
  import { setupGameMenuListeners } from './js/gameMenu.js';
  import { loadGameTranslations, setupLocalizationListener } from './js/settingsHandler.js';
  import { showConfirm } from './js/gameUI.js';

 document.addEventListener('DOMContentLoaded', function() {
    setupTitleScreenMenu();
    setupLocalizationListener();
    
    // Make setupGameMenuListeners globally available
    window.setupGameMenuListeners = setupGameMenuListeners;
    
    // Set up in-game menu listeners once
    setupGameMenuListeners();
    
    window.showConfirm = showConfirm;
});
</script>

</body>
</html>
